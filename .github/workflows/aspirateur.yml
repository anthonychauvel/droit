name: Aspirateur Légifrance (CCN + Code du travail)

# Se lance à la main depuis l'onglet "Actions" de GitHub (bouton "Run workflow"),
# accessible depuis Safari ou l'app GitHub sur iPhone. Pas besoin d'ordinateur.
on:
  # Veille : DEUX runs par semaine (lundi et jeudi, 6h UTC). Combiné à la
  # rotation sur 10 tranches, tout le corpus est repassé une fois toutes les
  # 5 semaines (2 tranches/semaine). Chaque run se commit -> historique gratuit.
  schedule:
    - cron: "0 6 * * 1"   # lundi (créneau 0)
    - cron: "0 6 * * 4"   # jeudi (créneau 1)
  workflow_dispatch:
    inputs:
      cible:
        description: "Que récupérer ?"
        required: true
        default: "ccn"
        type: choice
        options:
          - ccn
          - code-travail
          - code-secu
          - jurisprudence
          - decouvrir-jurisprudence
          - lister-tous-articles-travail
          - lister-tous-articles-secu
          - lister-tous-ccn
          - code-travail-complet
          - code-secu-complet
          - les-deux
          - tout
      idcc_liste:
        description: "IDCC séparés par des virgules (vide = utilise idcc_list.txt)"
        required: false
        default: ""
      seulement_manquants:
        description: "Ne retraiter que les IDCC absents/en erreur (plus rapide, ignore les déjà-OK)"
        required: true
        default: "oui"
        type: choice
        options:
          - oui
          - non
      environnement:
        description: "sandbox ou production"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - production

permissions:
  contents: write   # sans ça, le token automatique ne peut pas faire "git push"

jobs:
  aspirer:
    runs-on: ubuntu-latest
    env:
      PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
      PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
      PISTE_ENV: ${{ github.event.inputs.environnement || 'production' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Veille : recenser TOUS les numéros (IDCC + articles) — lundi, pour injecter les nouveaux"
        if: ${{ always() && github.event_name == 'schedule' }}
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            echo "== Lundi : recensement complet de l'univers (IDCC + articles) =="
            python3 scripts/list_all_ccn.py --out idcc_list_complet.txt --debug-dir debug_list_ccn || echo "list_all_ccn a échoué, pas bloquant pour la suite du run"
            python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006072050 --out all_articles_code_travail.txt || echo "list_all_code_articles (travail) a échoué, pas bloquant"
            python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006073189 --out all_articles_code_secu.txt || echo "list_all_code_articles (sécu) a échoué, pas bloquant"
          else
            echo "== Jeudi : pas de recensement complet (on remplit les nouveautés du lundi) =="
          fi
          # Signale ce qui est nouveau (rapport visible dans l'onglet Mises à jour).
          python3 scripts/detect_nouveaux.py --suivi idcc_list.txt --univers idcc_list_complet.txt --label "IDCC" || true
          python3 scripts/detect_nouveaux.py --suivi articles_list.txt --univers all_articles_code_travail.txt --label "article-travail" || true
          python3 scripts/detect_nouveaux.py --suivi articles_list_css.txt --univers all_articles_code_secu.txt --label "article-secu" || true

      - name: "PRIORITÉ nouveautés : remplir les numéros manquants de l'univers + PUSH LIVE"
        if: ${{ always() && github.event_name == 'schedule' }}
        run: |
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"
          # Un « nouveau numéro » = présent dans l'univers complet (recensé le lundi)
          # mais sans fichier récupéré. On le remplit TOUT DE SUITE (plafonné), donc
          # un IDCC/article découvert lundi est rempli et consultable dès le run
          # suivant (jeudi) — sans attendre son tour dans la rotation sur 5 semaines.
          # Le plafond protège le run du timeout GitHub ; le reliquat passe au run
          # d'après, en boucle, jusqu'à ce que tout soit rempli.
          MAXCCN=300; MAXART=800
          if [ -s idcc_list_complet.txt ]; then
            echo "== Remplissage prioritaire CCN manquantes (max $MAXCCN) =="
            python3 scripts/pull_ccn.py --idcc-file idcc_list_complet.txt --out output/ccn --only-missing --max $MAXCCN || true
          fi
          if [ -s all_articles_code_travail.txt ]; then
            echo "== Remplissage prioritaire articles Code du travail manquants (max $MAXART) =="
            python3 scripts/pull_code_travail.py --articles-file all_articles_code_travail.txt --code-id LEGITEXT000006072050 --out output/code-travail --only-missing --max $MAXART || true
          fi
          if [ -s all_articles_code_secu.txt ]; then
            echo "== Remplissage prioritaire articles Code sécu manquants (max $MAXART) =="
            python3 scripts/pull_code_travail.py --articles-file all_articles_code_secu.txt --code-id LEGITEXT000006073189 --out output/code-secu --only-missing --max $MAXART || true
          fi
          # Regénère index + manifeste pour que les nouveautés soient cherchables et
          # consultables immédiatement, puis PUSH LIVE (les changements partent tout
          # de suite, sans attendre la fin des étapes lentes qui suivent).
          python3 scripts/build_search_index.py --out output/search-index.json || true
          python3 scripts/build_manifest.py --out output/manifest.json || true
          git add output/ audits/ idcc_list_complet.txt all_articles_code_travail.txt all_articles_code_secu.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucun nouveau numéro à remplir ce run."
          else
            git commit -m "Live: nouveaux numéros injectés + remplis ($(date -u +%Y-%m-%dT%H:%MZ))"
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
            echo "PUSH LIVE effectué : les nouveautés sont en ligne."
          fi

      - name: Récupérer les CCN (KALI)
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Veille tournante sur l'univers COMPLET (idcc_list_complet.txt, ~485+ IDCC,
            # généré par l'étape précédente) sur 5 semaines (2 tranches/semaine) -- pas juste les 316 déjà
            # suivis. Repli sur idcc_list.txt si le fichier complet n'existe pas encore
            # (premier run, ou échec de list_all_ccn.py cette semaine-là).
            SOURCE="idcc_list_complet.txt"
            [ -s "$SOURCE" ] || SOURCE="idcc_list.txt"
            echo "Source utilisée pour la rotation : $SOURCE"
            python3 scripts/rotation_helper.py --in "$SOURCE" --periode 10 --out /tmp/tranche_idcc.txt
            python3 scripts/pull_ccn.py --idcc-file /tmp/tranche_idcc.txt --out output/ccn
            python3 scripts/pull_ccn.py --idcc-file idcc_list.txt --out output/ccn --only-missing
          else
            FLAG=""
            if [ "${{ github.event.inputs.seulement_manquants || 'oui' }}" = "oui" ]; then
              FLAG="--only-missing"
            fi
            if [ -n "${{ github.event.inputs.idcc_liste }}" ]; then
              python3 scripts/pull_ccn.py --idcc "${{ github.event.inputs.idcc_liste }}" --out output/ccn $FLAG
            else
              python3 scripts/pull_ccn.py --idcc-file idcc_list.txt --out output/ccn $FLAG
            fi
          fi

      - name: Compléter les avenants salaire (texte intégral)
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_salary_details.py --ccn-dir output/ccn

      - name: Compléter les clauses heures sup/majoration/contingent
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_overtime_details.py --ccn-dir output/ccn

      - name: Compléter les clauses forfait jours/cadres autonomes/cadres dirigeants
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_forfaitjours_details.py --ccn-dir output/ccn

      - name: Compléter les clauses temps partiel/heures complémentaires
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_partiel_details.py --ccn-dir output/ccn

      - name: Compléter les sections classification/coefficients
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_classification_details.py --ccn-dir output/ccn

      - name: Récupérer le Code du travail
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'code-travail' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SOURCE="all_articles_code_travail.txt"
            [ -s "$SOURCE" ] || SOURCE="articles_list.txt"
            echo "Source utilisée pour la rotation : $SOURCE ($(wc -l < "$SOURCE") articles)"
            python3 scripts/rotation_helper.py --in "$SOURCE" --periode 10 --out /tmp/tranche_travail.txt
            echo "Tranche de cette semaine : $(wc -l < /tmp/tranche_travail.txt) articles"
            python3 scripts/pull_code_travail.py --articles-file /tmp/tranche_travail.txt --code-id LEGITEXT000006072050 --out output/code-travail
          else
            python3 scripts/pull_code_travail.py --articles-file articles_list.txt --code-id LEGITEXT000006072050 --out output/code-travail
          fi

      - name: Récupérer le Code de la sécurité sociale
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'code-secu' || github.event.inputs.cible == 'tout') }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SOURCE="all_articles_code_secu.txt"
            [ -s "$SOURCE" ] || SOURCE="articles_list_css.txt"
            echo "Source utilisée pour la rotation : $SOURCE ($(wc -l < "$SOURCE") articles)"
            python3 scripts/rotation_helper.py --in "$SOURCE" --periode 10 --out /tmp/tranche_secu.txt
            python3 scripts/pull_code_travail.py --articles-file /tmp/tranche_secu.txt --code-id LEGITEXT000006073189 --out output/code-secu
          else
            python3 scripts/pull_code_travail.py --articles-file articles_list_css.txt --code-id LEGITEXT000006073189 --out output/code-secu
          fi

      - name: "Récupérer la jurisprudence (Judilibre — chambre sociale)"
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'jurisprudence' || github.event.inputs.cible == 'tout') }}
        run: |
          # Judilibre (Cour de cassation) via PISTE, MÊMES identifiants que Légifrance
          # (l'API "Judilibre" doit être ajoutée à la même application PISTE + CGU
          # validées une fois). Découverte thématique en droit du travail, on ne
          # récupère que les décisions NOUVELLES -> le corpus s'enrichit à chaque run.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python3 scripts/pull_judilibre.py --out output/jurisprudence --chamber soc --per-theme 20 --max-decisions 150 --only-missing || echo "Judilibre a échoué (abonnement PISTE/CGU ?), pas bloquant"
          else
            python3 scripts/pull_judilibre.py --out output/jurisprudence --chamber soc --per-theme 40 --max-decisions 500 || echo "Judilibre a échoué (abonnement PISTE/CGU ?), pas bloquant"
          fi

      - name: "Découvrir largement de la jurisprudence (Judilibre, toutes chambres)"
        if: ${{ always() && github.event.inputs.cible == 'decouvrir-jurisprudence' }}
        run: |
          # Remplit directement output/jurisprudence (toutes chambres, plafond élevé).
          python3 scripts/pull_judilibre.py --out output/jurisprudence --chamber "" --jurisdiction "" --per-theme 50 --max-decisions 800

      - name: Lister tous les articles du Code du travail (préparation seulement)
        if: ${{ always() && github.event.inputs.cible == 'lister-tous-articles-travail' }}
        run: |
          python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006072050 --out all_articles_code_travail.txt

      - name: Lister tous les articles du Code de la sécurité sociale (préparation seulement)
        if: ${{ always() && github.event.inputs.cible == 'lister-tous-articles-secu' }}
        run: |
          python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006073189 --out all_articles_code_secu.txt

      - name: "Lister tous les IDCC disponibles (exploratoire -- voir debug_list_ccn/ après coup)"
        if: ${{ always() && github.event.inputs.cible == 'lister-tous-ccn' }}
        run: |
          python3 scripts/list_all_ccn.py --out idcc_list_complet.txt --debug-dir debug_list_ccn

      - name: "ATTENTION ECHELLE : Récupérer le contenu de TOUS les articles du Code du travail (~10-12k, plusieurs heures, par lots avec reprise automatique)"
        if: ${{ always() && github.event.inputs.cible == 'code-travail-complet' }}
        run: |
          if [ ! -f all_articles_code_travail.txt ]; then
            echo "ERREUR : all_articles_code_travail.txt introuvable."
            echo "Lance d'abord un run avec cible=lister-tous-articles-travail, laisse-le commiter le fichier, PUIS relance celui-ci."
            exit 1
          fi
          mkdir -p output/code-travail
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"

          python3 -c "
          import os
          with open('all_articles_code_travail.txt', encoding='utf-8') as f:
              all_arts = [l.strip() for l in f if l.strip()]
          restants = [a for a in all_arts if not os.path.exists(f'output/code-travail/{a.replace(\"/\",\"-\")}.json')]
          print(f'{len(all_arts)} au total, {len(restants)} restants à récupérer')
          with open('/tmp/restants.txt', 'w', encoding='utf-8') as f:
              f.write(chr(10).join(restants))
          "

          split -l 700 /tmp/restants.txt /tmp/lot_
          for lot in /tmp/lot_*; do
            n=$(wc -l < "$lot")
            [ "$n" -eq 0 ] && continue
            echo "=== Lot de $n articles ($lot) ==="
            python3 scripts/pull_code_travail.py --articles-file "$lot" --code-id LEGITEXT000006072050 --out output/code-travail
            git add output/code-travail/
            git diff --staged --quiet || git commit -m "Code du travail complet : lot $(basename $lot) ($(date -u +%Y-%m-%d %H:%M))"
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
          done
          echo "Terminé (ou temps écoulé -- relance simplement la même option pour reprendre là où ça s'est arrêté)."

      - name: "ATTENTION ECHELLE : Récupérer le contenu de TOUS les articles du Code de la sécurité sociale (plusieurs heures, par lots avec reprise automatique)"
        if: ${{ always() && github.event.inputs.cible == 'code-secu-complet' }}
        run: |
          if [ ! -f all_articles_code_secu.txt ]; then
            echo "ERREUR : all_articles_code_secu.txt introuvable."
            echo "Lance d'abord un run avec cible=lister-tous-articles-secu, laisse-le commiter le fichier, PUIS relance celui-ci."
            exit 1
          fi
          mkdir -p output/code-secu
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"

          python3 -c "
          import os
          with open('all_articles_code_secu.txt', encoding='utf-8') as f:
              all_arts = [l.strip() for l in f if l.strip()]
          restants = [a for a in all_arts if not os.path.exists(f'output/code-secu/{a.replace(\"/\",\"-\")}.json')]
          print(f'{len(all_arts)} au total, {len(restants)} restants à récupérer')
          with open('/tmp/restants_secu.txt', 'w', encoding='utf-8') as f:
              f.write(chr(10).join(restants))
          "

          split -l 700 /tmp/restants_secu.txt /tmp/lotsecu_
          for lot in /tmp/lotsecu_*; do
            n=$(wc -l < "$lot")
            [ "$n" -eq 0 ] && continue
            echo "=== Lot de $n articles ($lot) ==="
            python3 scripts/pull_code_travail.py --articles-file "$lot" --code-id LEGITEXT000006073189 --out output/code-secu
            git add output/code-secu/
            git diff --staged --quiet || git commit -m "Code sécu complet : lot $(basename $lot) ($(date -u +%Y-%m-%d %H:%M))"
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
          done
          echo "Terminé (ou temps écoulé -- relance simplement la même option pour reprendre là où ça s'est arrêté)."

      - name: "Classer conservé vs complet-uniquement"
        if: always()
        run: |
          python3 scripts/classify_source.py --out output/classification-source.json

      - name: Construire l'index de recherche par mots-clés
        if: always()
        run: |
          python3 scripts/build_search_index.py --out output/search-index.json

      - name: "Construire le manifeste complet (liste intégrale + états validé/abrogé)"
        if: always()
        run: |
          python3 scripts/build_manifest.py --out output/manifest.json

      - name: "Exporter la liste CCN pour recherche.html (titres officiels, repo droit uniquement)"
        if: always()
        run: |
          python3 scripts/export_ccn_liste.py --ccn-dir output/ccn --out output/ccn-liste.json

      - name: Générer le rapport d'audit des changements de ce run
        if: always()
        run: |
          python3 scripts/generate_audit_report.py --out audits

      - name: Commit et push des résultats
        if: always()
        run: |
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"
          git add output/ audits/ 2>/dev/null || true
          for f in all_articles_code_travail.txt all_articles_code_secu.txt idcc_list_complet.txt jurisprudence_decouverte.txt; do
            [ -f "$f" ] && git add "$f"
          done
          [ -d debug_list_ccn ] && git add debug_list_ccn/
          git diff --staged --quiet || git commit -m "Mise à jour données Légifrance ($(date -u +%Y-%m-%d))"
          git pull --rebase --autostash origin main || true
          git push || (sleep 5 && git pull --rebase --autostash origin main && git push)

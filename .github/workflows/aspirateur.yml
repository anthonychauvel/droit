name: Aspirateur Légifrance (CCN + Code du travail)

# Se lance à la main depuis l'onglet "Actions" de GitHub (bouton "Run workflow"),
# accessible depuis Safari ou l'app GitHub sur iPhone. Pas besoin d'ordinateur.
on:
  # Veille automatique : re-vérifie tout chaque lundi à 6h du matin (heure serveur GitHub, UTC).
  # Comme les résultats sont commités dans le repo, tout changement réel (nouvel avenant,
  # texte modifié) apparaît comme un nouveau commit avec un diff -- historique des
  # changements gratuit, sans rien construire de plus.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      cible:
        description: "Que récupérer ?"
        required: true
        default: "ccn"
        type: choice
        options:
          - ccn
          - code-travail
          - code-secu
          - jurisprudence
          - lister-tous-articles-travail
          - lister-tous-articles-secu
          - lister-tous-ccn
          - code-travail-complet
          - code-secu-complet
          - les-deux
          - tout
      idcc_liste:
        description: "IDCC séparés par des virgules (vide = utilise idcc_list.txt)"
        required: false
        default: ""
      seulement_manquants:
        description: "Ne retraiter que les IDCC absents/en erreur (plus rapide, ignore les déjà-OK)"
        required: true
        default: "oui"
        type: choice
        options:
          - oui
          - non
      environnement:
        description: "sandbox ou production"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - production

permissions:
  contents: write   # sans ça, le token automatique ne peut pas faire "git push"

jobs:
  aspirer:
    runs-on: ubuntu-latest
    env:
      PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
      PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
      PISTE_ENV: ${{ github.event.inputs.environnement || 'production' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Récupérer les CCN (KALI)
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          FLAG=""
          if [ "${{ github.event.inputs.seulement_manquants || 'oui' }}" = "oui" ]; then
            FLAG="--only-missing"
          fi
          if [ -n "${{ github.event.inputs.idcc_liste }}" ]; then
            python3 scripts/pull_ccn.py --idcc "${{ github.event.inputs.idcc_liste }}" --out output/ccn $FLAG
          else
            python3 scripts/pull_ccn.py --idcc-file idcc_list.txt --out output/ccn $FLAG
          fi

      - name: Compléter les avenants salaire (texte intégral)
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_salary_details.py --ccn-dir output/ccn

      - name: Compléter les clauses heures sup/majoration/contingent
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_overtime_details.py --ccn-dir output/ccn

      - name: Compléter les clauses forfait jours/cadres autonomes/cadres dirigeants
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_forfaitjours_details.py --ccn-dir output/ccn

      - name: Compléter les clauses temps partiel/heures complémentaires
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_partiel_details.py --ccn-dir output/ccn

      - name: Compléter les sections classification/coefficients
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_classification_details.py --ccn-dir output/ccn

      - name: Récupérer le Code du travail
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'code-travail' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/pull_code_travail.py --articles-file articles_list.txt --code-id LEGITEXT000006072050 --out output/code-travail

      - name: Récupérer le Code de la sécurité sociale
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'code-secu' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/pull_code_travail.py --articles-file articles_list_css.txt --code-id LEGITEXT000006073189 --out output/code-secu

      - name: Récupérer la jurisprudence
        if: ${{ always() && (github.event.inputs.cible == 'jurisprudence' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/pull_jurisprudence.py --arrets-file arrets_list.txt --out output/jurisprudence

      - name: Lister tous les articles du Code du travail (préparation seulement)
        if: ${{ always() && github.event.inputs.cible == 'lister-tous-articles-travail' }}
        run: |
          python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006072050 --out all_articles_code_travail.txt

      - name: Lister tous les articles du Code de la sécurité sociale (préparation seulement)
        if: ${{ always() && github.event.inputs.cible == 'lister-tous-articles-secu' }}
        run: |
          python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006073189 --out all_articles_code_secu.txt

      - name: "Lister tous les IDCC disponibles (exploratoire -- voir debug_list_ccn/ après coup)"
        if: ${{ always() && github.event.inputs.cible == 'lister-tous-ccn' }}
        run: |
          python3 scripts/list_all_ccn.py --out idcc_list_complet.txt --debug-dir debug_list_ccn

      - name: "ATTENTION ECHELLE : Récupérer le contenu de TOUS les articles du Code du travail (~10-12k, plusieurs heures, par lots avec reprise automatique)"
        if: ${{ always() && github.event.inputs.cible == 'code-travail-complet' }}
        run: |
          if [ ! -f all_articles_code_travail.txt ]; then
            echo "ERREUR : all_articles_code_travail.txt introuvable."
            echo "Lance d'abord un run avec cible=lister-tous-articles-travail, laisse-le commiter le fichier, PUIS relance celui-ci."
            exit 1
          fi
          mkdir -p output/code-travail-complet
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"

          python3 -c "
          import os
          with open('all_articles_code_travail.txt', encoding='utf-8') as f:
              all_arts = [l.strip() for l in f if l.strip()]
          restants = [a for a in all_arts if not os.path.exists(f'output/code-travail-complet/{a.replace(\"/\",\"-\")}.json')]
          print(f'{len(all_arts)} au total, {len(restants)} restants à récupérer')
          with open('/tmp/restants.txt', 'w', encoding='utf-8') as f:
              f.write(chr(10).join(restants))
          "

          split -l 700 /tmp/restants.txt /tmp/lot_
          for lot in /tmp/lot_*; do
            n=$(wc -l < "$lot")
            [ "$n" -eq 0 ] && continue
            echo "=== Lot de $n articles ($lot) ==="
            python3 scripts/pull_code_travail.py --articles-file "$lot" --code-id LEGITEXT000006072050 --out output/code-travail-complet
            git add output/code-travail-complet/
            git diff --staged --quiet || git commit -m "Code du travail complet : lot $(basename $lot) ($(date -u +%Y-%m-%d %H:%M))"
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
          done
          echo "Terminé (ou temps écoulé -- relance simplement la même option pour reprendre là où ça s'est arrêté)."

      - name: "ATTENTION ECHELLE : Récupérer le contenu de TOUS les articles du Code de la sécurité sociale (plusieurs heures, par lots avec reprise automatique)"
        if: ${{ always() && github.event.inputs.cible == 'code-secu-complet' }}
        run: |
          if [ ! -f all_articles_code_secu.txt ]; then
            echo "ERREUR : all_articles_code_secu.txt introuvable."
            echo "Lance d'abord un run avec cible=lister-tous-articles-secu, laisse-le commiter le fichier, PUIS relance celui-ci."
            exit 1
          fi
          mkdir -p output/code-secu-complet
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"

          python3 -c "
          import os
          with open('all_articles_code_secu.txt', encoding='utf-8') as f:
              all_arts = [l.strip() for l in f if l.strip()]
          restants = [a for a in all_arts if not os.path.exists(f'output/code-secu-complet/{a.replace(\"/\",\"-\")}.json')]
          print(f'{len(all_arts)} au total, {len(restants)} restants à récupérer')
          with open('/tmp/restants_secu.txt', 'w', encoding='utf-8') as f:
              f.write(chr(10).join(restants))
          "

          split -l 700 /tmp/restants_secu.txt /tmp/lotsecu_
          for lot in /tmp/lotsecu_*; do
            n=$(wc -l < "$lot")
            [ "$n" -eq 0 ] && continue
            echo "=== Lot de $n articles ($lot) ==="
            python3 scripts/pull_code_travail.py --articles-file "$lot" --code-id LEGITEXT000006073189 --out output/code-secu-complet
            git add output/code-secu-complet/
            git diff --staged --quiet || git commit -m "Code sécu complet : lot $(basename $lot) ($(date -u +%Y-%m-%d %H:%M))"
            git pull --rebase --autostash origin main || true
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
          done
          echo "Terminé (ou temps écoulé -- relance simplement la même option pour reprendre là où ça s'est arrêté)."

      - name: Construire l'index de recherche par mots-clés
        if: always()
        run: |
          python3 scripts/build_search_index.py --out output/search-index.json

      - name: Générer le rapport d'audit des changements de ce run
        if: always()
        run: |
          python3 scripts/generate_audit_report.py --out audits

      - name: Commit et push des résultats
        if: always()
        run: |
          git config user.name "Aspirateur Légifrance (bot)"
          git config user.email "action@github.com"
          git add output/ audits/ all_articles_code_travail.txt all_articles_code_secu.txt idcc_list_complet.txt debug_list_ccn/ 2>/dev/null || git add output/ audits/
          git diff --staged --quiet || git commit -m "Mise à jour données Légifrance ($(date -u +%Y-%m-%d))"
          git pull --rebase --autostash origin main || true
          git push || (sleep 5 && git pull --rebase --autostash origin main && git push)

name: Aspirateur Légifrance (CCN + Code du travail)

# Se lance à la main depuis l'onglet "Actions" de GitHub (bouton "Run workflow"),
# accessible depuis Safari ou l'app GitHub sur iPhone. Pas besoin d'ordinateur.
on:
  # Veille automatique : re-vérifie tout chaque lundi à 6h du matin (heure serveur GitHub, UTC).
  # Comme les résultats sont commités dans le repo, tout changement réel (nouvel avenant,
  # texte modifié) apparaît comme un nouveau commit avec un diff -- historique des
  # changements gratuit, sans rien construire de plus.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      cible:
        description: "Que récupérer ?"
        required: true
        default: "ccn"
        type: choice
        options:
          - ccn
          - code-travail
          - code-secu
          - jurisprudence
          - decouvrir-jurisprudence
          - lister-tous-articles-travail
          - lister-tous-articles-secu
          - lister-tous-ccn
          - code-travail-complet
          - code-secu-complet
          - les-deux
          - tout
      idcc_liste:
        description: "IDCC séparés par des virgules (vide = utilise idcc_list.txt)"
        required: false
        default: ""
      seulement_manquants:
        description: "Ne retraiter que les IDCC absents/en erreur (plus rapide, ignore les déjà-OK)"
        required: true
        default: "oui"
        type: choice
        options:
          - oui
          - non
      environnement:
        description: "sandbox ou production"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - production

permissions:
  contents: write   # sans ça, le token automatique ne peut pas faire "git push"

jobs:
  aspirer:
    runs-on: ubuntu-latest
    env:
      PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
      PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
      PISTE_ENV: ${{ github.event.inputs.environnement || 'production' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Veille : détecter les nouveaux IDCC/articles (léger, schedule seulement)"
        if: ${{ always() && github.event_name == 'schedule' }}
        run: |
          python3 scripts/list_all_ccn.py --out idcc_list_complet.txt --debug-dir debug_list_ccn || echo "list_all_ccn a échoué, pas bloquant pour la suite du run"
          python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006072050 --out all_articles_code_travail.txt || echo "list_all_code_articles (travail) a échoué, pas bloquant"
          python3 scripts/list_all_code_articles.py --code-id LEGITEXT000006073189 --out all_articles_code_secu.txt || echo "list_all_code_articles (sécu) a échoué, pas bloquant"
          python3 scripts/detect_nouveaux.py --suivi idcc_list.txt --univers idcc_list_complet.txt --label "IDCC" || true
          python3 scripts/detect_nouveaux.py --suivi articles_list.txt --univers all_articles_code_travail.txt --label "article-travail" || true
          python3 scripts/detect_nouveaux.py --suivi articles_list_css.txt --univers all_articles_code_secu.txt --label "article-secu" || true

      - name: Récupérer les CCN (KALI)
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Veille tournante sur l'univers COMPLET (idcc_list_complet.txt, ~485+ IDCC,
            # généré par l'étape précédente) sur 5 semaines -- pas juste les 316 déjà
            # suivis. Repli sur idcc_list.txt si le fichier complet n'existe pas encore
            # (premier run, ou échec de list_all_ccn.py cette semaine-là).
            SOURCE="idcc_list_complet.txt"
            [ -s "$SOURCE" ] || SOURCE="idcc_list.txt"
            echo "Source utilisée pour la rotation : $SOURCE"
            python3 scripts/rotation_helper.py --in "$SOURCE" --periode 5 --out /tmp/tranche_idcc.txt
            python3 scripts/pull_ccn.py --idcc-file /tmp/tranche_idcc.txt --out output/ccn
            python3 scripts/pull_ccn.py --idcc-file idcc_list.txt --out output/ccn --only-missing
          else
            FLAG=""
            if [ "${{ github.event.inputs.seulement_manquants || 'oui' }}" = "oui" ]; then
              FLAG="--only-missing"
            fi
            if [ -n "${{ github.event.inputs.idcc_liste }}" ]; then
              python3 scripts/pull_ccn.py --idcc "${{ github.event.inputs.idcc_liste }}" --out output/ccn $FLAG
            else
              python3 scripts/pull_ccn.py --idcc-file idcc_list.txt --out output/ccn $FLAG
            fi
          fi

      - name: Compléter les avenants salaire (texte intégral)
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_salary_details.py --ccn-dir output/ccn

      - name: Compléter les clauses heures sup/majoration/contingent
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_overtime_details.py --ccn-dir output/ccn

      - name: Compléter les clauses forfait jours/cadres autonomes/cadres dirigeants
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_forfaitjours_details.py --ccn-dir output/ccn

      - name: Compléter les clauses temps partiel/heures complémentaires
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_partiel_details.py --ccn-dir output/ccn

      - name: Compléter les sections classification/coefficients
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'ccn' || github.event.inputs.cible == 'les-deux' || github.event.inputs.cible == 'tout') }}
        run: |
          python3 scripts/fetch_classification_details.py --ccn-dir output/ccn

      - name: Récupérer le Code du travail
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.cible == 'code-travail' || github.event.inputs.cible == '
